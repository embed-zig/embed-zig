name: long press white fade goes through intermediate steps
tracks:
  gpio:
    - send: {"dev":"gpio","pin":0,"voltage":0}
    - wait: 600
    - send: {"dev":"gpio","pin":0,"voltage":3.3}
  led_strip:
    - wait: 1000
    - match_until:
        target: {"dev":"led_strip","pixels":[{"r":50,"g":50,"b":50}]}
        count: 10
    - match_until:
        target: {"dev":"led_strip","pixels":[{"r":125,"g":125,"b":125}]}
        count: 15
    - match_until:
        target: {"dev":"led_strip","pixels":[{"r":255,"g":255,"b":255}]}
        count: 26
