name: quad click turns LED white
tracks:
  gpio:
    - send: {"dev":"gpio","pin":0,"voltage":0}
    - wait: 50
    - send: {"dev":"gpio","pin":0,"voltage":3.3}
    - wait: 100
    - send: {"dev":"gpio","pin":0,"voltage":0}
    - wait: 50
    - send: {"dev":"gpio","pin":0,"voltage":3.3}
    - wait: 100
    - send: {"dev":"gpio","pin":0,"voltage":0}
    - wait: 50
    - send: {"dev":"gpio","pin":0,"voltage":3.3}
    - wait: 100
    - send: {"dev":"gpio","pin":0,"voltage":0}
    - wait: 50
    - send: {"dev":"gpio","pin":0,"voltage":3.3}
  led_strip:
    - wait: 1500
    - match_until:
        target: {"dev":"led_strip","pixels":[{"r":255,"g":255,"b":255}]}
        count: 51
