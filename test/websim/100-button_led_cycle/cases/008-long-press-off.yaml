name: long press after click toggles LED off
tracks:
  gpio:
    # single click to turn on red
    - send: {"dev":"gpio","pin":0,"voltage":0}
    - wait: 50
    - send: {"dev":"gpio","pin":0,"voltage":3.3}
    - wait: 3000
    # long press to turn off
    - send: {"dev":"gpio","pin":0,"voltage":0}
    - wait: 600
    - send: {"dev":"gpio","pin":0,"voltage":3.3}
  led_strip:
    # fade to red
    - wait: 800
    - match_until:
        target: {"dev":"led_strip","pixels":[{"r":255,"g":0,"b":0}]}
    # fade to black
    - match_until:
        target: {"dev":"led_strip","pixels":[{"r":0,"g":0,"b":0}]}
